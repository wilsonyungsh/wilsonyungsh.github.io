<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSQ Level 8 — Team Bookings</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 2rem; color: #1a1a1a; }
h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.subtitle { font-size: 12px; color: #999; margin-bottom: 1.25rem; }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; }
.tab { padding: 6px 18px; border-radius: 8px; border: 1px solid #d0d0d0; background: #fff; font-size: 13px; cursor: pointer; color: #555; }
.tab.active { background: #3b82f6; color: #fff; border-color: #3b82f6; font-weight: 500; }
.view { display: none; }
.view.active { display: block; }

/* Card */
.card { background: #fff; border-radius: 12px; padding: 1.5rem; border: 1px solid #e0e0e0; }

/* Calendar */
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
.cal-title { font-size: 16px; font-weight: 600; }
.cal-nav { display: flex; gap: 6px; align-items: center; }
.cal-nav button { background: transparent; border: 1px solid #d0d0d0; border-radius: 8px; padding: 4px 12px; cursor: pointer; font-size: 13px; color: #555; }
.cal-nav button:hover { background: #f0f0f0; }
.today-btn { font-size: 12px; padding: 4px 10px; border-radius: 8px; border: 1px solid #3b82f6 !important; color: #3b82f6 !important; background: #fff !important; cursor: pointer; }
.today-btn:hover { background: #eff6ff !important; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-dow { text-align: center; font-size: 11px; color: #999; padding: 4px 0 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
.cal-day { min-height: 56px; border-radius: 8px; border: 1px solid #ebebeb; padding: 5px 6px; cursor: pointer; transition: border-color 0.15s; background: #fff; }
.cal-day:hover { border-color: #bbb; }
.cal-day.other-month { background: #fafafa; opacity: 0.45; cursor: default; pointer-events: none; }
.cal-day.has-bookings { border-color: #93c5fd; }
.cal-day.selected { border: 2px solid #3b82f6; background: #eff6ff; }
.cal-day.today { border-color: #fbbf24; }
.cal-day.today .day-num { color: #d97706; font-weight: 700; }
.cal-day.selected .day-num { color: #1d4ed8; font-weight: 600; }
.day-num { font-size: 12px; color: #888; margin-bottom: 3px; }
.pip-row { display: flex; flex-wrap: wrap; gap: 2px; }
.pip { width: 6px; height: 6px; border-radius: 50%; }

/* Booking panel */
.panel { margin-top: 1.25rem; background: #fff; border: 1px solid #ebebeb; border-radius: 12px; padding: 1rem 1.25rem; min-height: 80px; }
.panel-title { font-size: 13px; color: #888; margin-bottom: 10px; }
.booking-list { display: flex; flex-direction: column; gap: 6px; }
.booking-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; border-left: 3px solid transparent; }
.avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.booking-name { font-size: 13px; font-weight: 600; }
.booking-seat { font-size: 12px; opacity: 0.75; }
.empty-msg { font-size: 13px; color: #bbb; text-align: center; padding: 1rem 0; }
.count-badge { display: inline-block; background: #dbeafe; color: #1d4ed8; font-size: 11px; font-weight: 600; border-radius: 20px; padding: 2px 8px; margin-left: 6px; }

/* Legend */
.legend-header { display: flex; align-items: center; justify-content: space-between; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #f0f0f0; }
.legend-label { font-size: 11px; color: #bbb; }
.legend-reset { font-size: 11px; color: #bbb; cursor: pointer; border: none; background: none; text-decoration: underline; }
.legend-reset:hover { color: #ef4444; }
.legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
.legend-dot-btn {
  width: 14px; height: 14px; border-radius: 50%; border: 2px solid transparent;
  cursor: pointer; display: inline-block; position: relative; flex-shrink: 0;
  transition: transform 0.15s;
}
.legend-dot-btn:hover { transform: scale(1.3); border-color: #555; }
/* hidden native colour picker overlaid on the dot */
.legend-dot-btn input[type=color] {
  position: absolute; inset: 0; width: 100%; height: 100%;
  opacity: 0; cursor: pointer; border: none; padding: 0;
}

/* Table */
.tbl-controls { display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
.tbl-search { flex: 1; min-width: 180px; padding: 7px 12px; border: 1px solid #d0d0d0; border-radius: 8px; font-size: 13px; }
.tbl-search:focus { outline: none; border-color: #3b82f6; }
.tbl-filter { padding: 7px 12px; border: 1px solid #d0d0d0; border-radius: 8px; font-size: 13px; background: #fff; color: #555; cursor: pointer; }
.tbl-count { font-size: 12px; color: #999; margin-left: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid #ebebeb; cursor: pointer; user-select: none; white-space: nowrap; }
thead th:hover { color: #555; }
thead th .sort-icon { margin-left: 4px; opacity: 0.4; }
thead th.sorted .sort-icon { opacity: 1; color: #3b82f6; }
tbody tr { border-bottom: 1px solid #f5f5f5; }
tbody tr:hover { background: #fafafa; }
tbody td { padding: 8px 12px; color: #333; }
.team-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.team-RMU { background: #dbeafe; color: #1d4ed8; }
.team-PU  { background: #dcfce7; color: #166534; }
.person-chip { display: inline-flex; align-items: center; gap: 5px; }
.person-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.tbl-pagination { display: flex; align-items: center; justify-content: space-between; margin-top: 1rem; }
.tbl-pagination button { border: 1px solid #d0d0d0; background: #fff; border-radius: 8px; padding: 4px 12px; font-size: 13px; cursor: pointer; color: #555; }
.tbl-pagination button:disabled { opacity: 0.35; cursor: default; }
.tbl-pagination span { font-size: 12px; color: #999; }
.last-updated { margin-top: 0.75rem; text-align: right; font-size: 11px; color: #bbb; }
</style>
</head>

<h1>BSQ Level 8 — Team Bookings</h1>
<p class="subtitle">RMU &amp; PU desk bookings</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('calendar', this)">📅 Calendar</button>
  <button class="tab" onclick="switchTab('table', this)">🔍 Search</button>
</div>

<!-- CALENDAR VIEW -->
<div id="view-calendar" class="view active">
  <div class="card">
    <div class="cal-header">
      <div class="cal-title" id="calTitle"></div>
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">&#8592;</button>
        <button class="today-btn" onclick="goToToday()">Today</button>
        <button onclick="changeMonth(1)">&#8594;</button>
      </div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="panel" id="panel">
      <div class="empty-msg">Select a date to see bookings</div>
    </div>
    <div class="legend-header">
      <span class="legend-label">🎨 Click a dot to change colour</span>
      <button class="legend-reset" onclick="resetColours()">Reset all</button>
    </div>
    <div class="legend" id="legend"></div>
  </div>
</div>

<!-- TABLE VIEW -->
<div id="view-table" class="view">
  <div class="card">
    <div class="tbl-controls">
      <input class="tbl-search" id="tblSearch" type="text" placeholder="Search name, seat, team…" oninput="filterTable()">
      <select class="tbl-filter" id="tblTeam" onchange="filterTable()">
        <option value="">All teams</option>
        <option value="RMU">RMU</option>
        <option value="PU">PU</option>
      </select>
      <select class="tbl-filter" id="tblDow" onchange="filterTable()">
        <option value="">All days</option>
        <option>Mon</option><option>Tue</option><option>Wed</option>
        <option>Thu</option><option>Fri</option>
      </select>
      <span class="tbl-count" id="tblCount"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th onclick="sortTable('date', this)">Date <span class="sort-icon">↕</span></th>
          <th onclick="sortTable('dow', this)">Day <span class="sort-icon">↕</span></th>
          <th onclick="sortTable('person', this)">Person <span class="sort-icon">↕</span></th>
          <th onclick="sortTable('team', this)">Team <span class="sort-icon">↕</span></th>
          <th onclick="sortTable('workpoint', this)">Workpoint <span class="sort-icon">↕</span></th>
        </tr>
      </thead>
      <tbody id="tblBody"></tbody>
    </table>
    <div class="tbl-pagination">
      <button onclick="changePage(-1)" id="btnPrev">&#8592; Prev</button>
      <span id="pageInfo"></span>
      <button onclick="changePage(1)" id="btnNext">Next &#8594;</button>
    </div>
  </div>
</div>

const STORAGE_KEY = 'bsq_person_colours';

// Default palette (assigned alphabetically by name)
const PALETTE_DEFAULTS = [
  '#3b82f6','#22c55e','#ec4899','#eab308','#8b5cf6',
  '#f97316','#06b6d4','#ef4444','#10b981','#0ea5e9',
  '#d946ef','#4ade80','#fb923c','#a78bfa','#34d399','#f87171'
];

// Derive a light background from a hex colour
function hexToLight(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},0.12)`;
}
function hexToDark(hex) {
  // darken for text
  const r = Math.round(parseInt(hex.slice(1,3),16) * 0.55);
  const g = Math.round(parseInt(hex.slice(3,5),16) * 0.55);
  const b = Math.round(parseInt(hex.slice(5,7),16) * 0.55);
  return `rgb(${r},${g},${b})`;
}

// All unique persons sorted
const ALL_PERSONS = [...new Set(DATA.map(r => r.person))].sort();

// Load saved colours or assign defaults
function loadColours() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const result = {};
    ALL_PERSONS.forEach((p, i) => {
      result[p] = saved[p] || PALETTE_DEFAULTS[i % PALETTE_DEFAULTS.length];
    });
    return result;
  } catch(e) {
    const result = {};
    ALL_PERSONS.forEach((p, i) => { result[p] = PALETTE_DEFAULTS[i % PALETTE_DEFAULTS.length]; });
    return result;
  }
}

function saveColours() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(personHex)); } catch(e) {}
}

let personHex = loadColours();

function getColour(person) {
  const hex = personHex[person] || '#3b82f6';
  return { hex, bg: hexToLight(hex), border: hex, text: hexToDark(hex) };
}

function resetColours() {
  ALL_PERSONS.forEach((p, i) => { personHex[p] = PALETTE_DEFAULTS[i % PALETTE_DEFAULTS.length]; });
  saveColours();
  refresh();
}

// ── Tab switching ──────────────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if (name === 'table') renderTable();
}

// ── Helpers ────────────────────────────────────────────────────────────────
function localISO(date) {
  return date.getFullYear() + '-' +
    String(date.getMonth() + 1).padStart(2, '0') + '-' +
    String(date.getDate()).padStart(2, '0');
}
function initials(name) { return name.split(' ').map(p => p[0]).join('').toUpperCase().slice(0,2); }
function fmtDate(iso) {
  const [y,m,d] = iso.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
}
function getDow(iso) {
  const [y,m,d] = iso.split('-').map(Number);
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(y,m-1,d).getDay()];
}

// ── CALENDAR ───────────────────────────────────────────────────────────────
const MONTHS  = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOWLBLS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function buildIndex(data) {
  const m = {};
  data.forEach(r => {
    const key = String(r.date).slice(0,10);
    if (!m[key]) m[key] = [];
    m[key].push(r);
  });
  return m;
}
const indexed  = buildIndex(DATA);
const todayISO = localISO(new Date());
let cur = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
let selectedDate = todayISO;

function renderCalendar() {
  const grid  = document.getElementById('calGrid');
  const title = document.getElementById('calTitle');
  grid.innerHTML = '';
  title.textContent = MONTHS[cur.getMonth()] + ' ' + cur.getFullYear();
  DOWLBLS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow'; el.textContent = d; grid.appendChild(el);
  });
  const first = new Date(cur.getFullYear(), cur.getMonth(), 1);
  const last  = new Date(cur.getFullYear(), cur.getMonth()+1, 0);
  const startDow = first.getDay();
  for (let i=0; i<startDow; i++)
    grid.appendChild(makeDayEl(new Date(cur.getFullYear(), cur.getMonth(), i-startDow+1), true));
  for (let d=1; d<=last.getDate(); d++)
    grid.appendChild(makeDayEl(new Date(cur.getFullYear(), cur.getMonth(), d), false));
  const remaining = 42-(startDow+last.getDate());
  for (let i=1; i<=remaining; i++)
    grid.appendChild(makeDayEl(new Date(cur.getFullYear(), cur.getMonth()+1, i), true));
  showPanel(selectedDate, indexed[selectedDate] || []);
  renderLegend();
}

function makeDayEl(date, other) {
  const el       = document.createElement('div');
  const iso      = localISO(date);
  const bookings = indexed[iso] || [];
  let cls = 'cal-day';
  if (other)                cls += ' other-month';
  if (bookings.length)      cls += ' has-bookings';
  if (iso === todayISO)     cls += ' today';
  if (iso === selectedDate) cls += ' selected';
  el.className = cls;
  const num = document.createElement('div');
  num.className = 'day-num'; num.textContent = date.getDate(); el.appendChild(num);
  if (bookings.length) {
    const pips = document.createElement('div');
    pips.className = 'pip-row';
    bookings.slice(0,7).forEach(b => {
      const p = document.createElement('div');
      p.className = 'pip';
      p.style.background = getColour(b.person).border;
      pips.appendChild(p);
    });
    el.appendChild(pips);
  }
  if (!other) el.onclick = () => { selectedDate = iso; renderCalendar(); };
  return el;
}

function showPanel(iso, bookings) {
  const panel = document.getElementById('panel');
  const [y,mo,d] = iso.split('-').map(Number);
  const label = new Date(y,mo-1,d).toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  if (!bookings.length) {
    panel.innerHTML = `<div class="panel-title">${label}</div><div class="empty-msg">No bookings on this day</div>`;
    return;
  }
  const items = bookings.map(b => {
    const c = getColour(b.person);
    return `<div class="booking-item" style="background:${c.bg};border-left-color:${c.border};">
      <div class="avatar" style="background:${c.border}30;color:${c.text};">${initials(b.person)}</div>
      <div>
        <div class="booking-name" style="color:${c.text};">${b.person}</div>
        <div class="booking-seat" style="color:${c.text};">${b.workpoint}${b.team?' · '+b.team:''}</div>
      </div>
    </div>`;
  }).join('');
  panel.innerHTML = `
    <div class="panel-title">${label} <span class="count-badge">${bookings.length} booking${bookings.length>1?'s':''}</span></div>
    <div class="booking-list">${items}</div>`;
}

function renderLegend() {
  const legend = document.getElementById('legend');
  legend.innerHTML = ALL_PERSONS.map(name => {
    const hex = personHex[name] || '#3b82f6';
    return `<div class="legend-item">
      <span class="legend-dot-btn" style="background:${hex};" title="Click to change ${name}'s colour">
        <input type="color" value="${hex}" oninput="updateColour('${name.replace(/'/g,"\\'")}', this.value)"
               onchange="updateColour('${name.replace(/'/g,"\\'")}', this.value)">
      </span>
      ${name}
    </div>`;
  }).join('');
}

function updateColour(person, hex) {
  personHex[person] = hex;
  saveColours();
  refresh();
}

function refresh() {
  renderCalendar(); // re-renders legend too
  renderTable();
}

function goToToday() {
  cur = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
  selectedDate = todayISO;
  renderCalendar();
}
function changeMonth(dir) {
  cur = new Date(cur.getFullYear(), cur.getMonth()+dir, 1);
  renderCalendar();
}

// ── TABLE ──────────────────────────────────────────────────────────────────
const PAGE_SIZE = 20;
let filteredData = [...DATA];
let currentPage  = 1;
let sortKey      = 'date';
let sortDir      = 1;
let sortedTh     = null;

function filterTable() {
  const q    = document.getElementById('tblSearch').value.toLowerCase();
  const team = document.getElementById('tblTeam').value;
  const dow  = document.getElementById('tblDow').value;
  filteredData = DATA.filter(r => {
    const iso       = String(r.date).slice(0,10);
    const matchQ    = !q    || [r.person,r.workpoint,r.team,iso].some(v=>String(v).toLowerCase().includes(q));
    const matchTeam = !team || r.team===team;
    const matchDow  = !dow  || getDow(iso)===dow;
    return matchQ && matchTeam && matchDow;
  });
  currentPage = 1;
  renderTable();
}

function sortTable(key, th) {
  if (sortKey===key) sortDir*=-1; else { sortKey=key; sortDir=1; }
  if (sortedTh) sortedTh.classList.remove('sorted');
  th.classList.add('sorted'); sortedTh=th;
  renderTable();
}

function renderTable() {
  const sorted = [...filteredData].sort((a,b) => {
    const av = sortKey==='dow'?getDow(String(a.date).slice(0,10)):(sortKey==='date'?String(a.date):a[sortKey]);
    const bv = sortKey==='dow'?getDow(String(b.date).slice(0,10)):(sortKey==='date'?String(b.date):b[sortKey]);
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
  const total = sorted.length;
  const start = (currentPage-1)*PAGE_SIZE;
  const page  = sorted.slice(start, start+PAGE_SIZE);
  document.getElementById('tblCount').textContent = `${total} row${total!==1?'s':''}`;
  document.getElementById('pageInfo').textContent  = `Page ${currentPage} of ${Math.max(1,Math.ceil(total/PAGE_SIZE))}`;
  document.getElementById('btnPrev').disabled = currentPage===1;
  document.getElementById('btnNext').disabled = start+PAGE_SIZE>=total;
  document.getElementById('tblBody').innerHTML = page.map(r => {
    const iso = String(r.date).slice(0,10);
    const hex = personHex[r.person] || '#3b82f6';
    return `<tr>
      <td>${fmtDate(iso)}</td>
      <td>${getDow(iso)}</td>
      <td><span class="person-chip"><span class="person-dot" style="background:${hex};"></span>${r.person}</span></td>
      <td><span class="team-badge team-${r.team}">${r.team}</span></td>
      <td>${r.workpoint}</td>
    </tr>`;
  }).join('');
}

function changePage(dir) { currentPage+=dir; renderTable(); }

// ── Init ───────────────────────────────────────────────────────────────────
renderCalendar();
renderTable();
</script>
